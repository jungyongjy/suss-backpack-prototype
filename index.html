<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUSS Backpack Prototype</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #e5e7eb; }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom scrollbar for booking grid */
        .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; margin: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Dark Mode Scrollbar adjustments handled via JS dynamically where possible, 
           but CSS fallback is provided here */
        .dark-mode-scroll::-webkit-scrollbar-track { background: #374151; }
        .dark-mode-scroll::-webkit-scrollbar-thumb { background: #6b7280; }
        .dark-mode-scroll::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- The actual React App -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { 
          Bell, Settings, MapPin, CreditCard, Calendar as CalendarIcon, 
          Home, Menu, Camera, TrendingUp, BookOpen, Clock, ChevronRight, 
          Search, Navigation, Video, ChevronDown, ChevronUp, Users, Coffee, Briefcase, Layers,
          ArrowUpCircle, Info, Activity, ChevronLeft, CheckCircle, AlertTriangle, Moon, Sun, Phone, Mail, X,
          CalendarDays, FileText, Plus, Trash2, ChevronRight as CalendarArrowRight, ChevronLeft as CalendarArrowLeft,
          GraduationCap
        } from 'https://esm.sh/lucide-react@0.292.0';

        const App = () => {
          const [currentView, setCurrentView] = useState('home');
          const [isDarkMode, setIsDarkMode] = useState(false);

          // Mock User Data
          const user = {
            name: "Sarah Ng",
            email: "sarah.ng@suss.edu.sg",
            id: "S1234567A",
            currentCGPA: 4.20,
            currentCUs: 90, 
            major: "Marketing"
          };

          // Helper to generate room numbers
          const generateRooms = (block, level, start, end) => {
            let rooms = [];
            for(let i=start; i<=end; i++) {
                rooms.push(`${block}.${level}.${i.toString().padStart(2, '0')}`);
            }
            return rooms;
          };

          // --- Location Data ---
          const locationData = {
            "Food & Drink": { icon: Coffee, items: ["Cheers", "Far East Cafe", "Food & Drinks Vending Machines", "SIM Canteen", "Food Clique"] },
            "Meeting Rooms & Offices": { icon: Briefcase, items: ["Admin Group Office", "Admin Office IT", "Assignment Boxes", "AV Presentation Lab", "Biomed Engineering Lab 1", "Biomed Engineering Lab 2", "Boardroom A", "Boardroom C", "C6.A Meeting Room"] },
            "Seminar Rooms": { icon: BookOpen, items: [ ...generateRooms('C', 3, 8, 16), ...generateRooms('C', 4, 8, 16), ...generateRooms('C', 5, 7, 15), ...generateRooms('C', 6, 5, 13), ...generateRooms('C', 7, 7, 15), ...generateRooms('C', 8, 4, 11) ] },
            "Lecture Theatres": { icon: Users, items: ["LT 1", "LT 2", "LT 3"] },
            "Services": { icon: Settings, items: ["Student Support", "IT Helpdesk"] },
            "Recreation": { icon: TrendingUp, items: ["Gymnasium", "Student Lounge"] },
            "Blocks": { icon: Layers, items: ["Block A", "Block B", "Block C"] },
          };

          const MobileHeader = ({ title }) => (
            <div className={`px-4 py-3 flex items-center gap-3 shadow-sm sticky top-0 z-50 transition-colors ${isDarkMode ? 'bg-gray-800 border-b border-gray-700' : 'bg-white'}`}>
              <button onClick={() => setCurrentView('home')} className={`p-1.5 rounded-full transition-colors ${isDarkMode ? 'bg-gray-700 text-gray-300 hover:bg-gray-600' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}><ChevronLeft size={20} /></button>
              <h2 className={`font-bold text-lg ${isDarkMode ? 'text-white' : 'text-gray-800'}`}>{title}</h2>
            </div>
          );

          // --- Views ---

          const HomeView = () => {
            const [showNotifs, setShowNotifs] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [showMonthCalendar, setShowMonthCalendar] = useState(false);
            const [calendarMonthDate, setCalendarMonthDate] = useState(new Date(2026, 1, 1)); 
            
            const [currentWeekStart, setCurrentWeekStart] = useState(new Date(2026, 1, 2)); 
            const [selectedDate, setSelectedDate] = useState('2026-02-05'); 
            
            const scheduleScrollRef = useRef(null);
            const dateRefs = useRef({});

            const scheduleData = useMemo(() => {
              const data = {};
              let d = new Date(2026, 1, 2); 
              const endD = new Date(2026, 3, 12); 
              
              while (d <= endD) {
                const dateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                const day = d.getDay();
                if (day === 1) data[dateStr] = [{ type: 'class', title: 'BUS105', time: '0830 - 1130', venue: 'C.4.15', desc: 'Statistics' }];
                if (day === 3) data[dateStr] = [{ type: 'class', title: 'MKT202', time: '1200 - 1500', venue: 'Blk B 4.12', desc: 'Consumer Behavior' }];
                if (day === 4) data[dateStr] = [{ type: 'class', title: 'HRM313', time: '0830 - 1130', venue: 'C.3.11', desc: 'HR Management' }];
                d.setDate(d.getDate() + 1);
              }

              if(!data['2026-02-06']) data['2026-02-06'] = [];
              data['2026-02-06'].push({ type: 'deadline', title: 'NCO205', time: '2359', desc: 'Pre-course Quiz' });
              
              data['2026-02-08'] = [{ type: 'deadline', title: 'MKT202', time: '1200', desc: 'GBA01 (Group Based Assignment)' }];
              
              if(!data['2026-02-09']) data['2026-02-09'] = [];
              data['2026-02-09'].push({ type: 'event', title: 'Career Fair', time: '1000 - 1600', venue: 'Atrium', desc: 'Networking Event' });
              
              if(!data['2026-02-16']) data['2026-02-16'] = [];
              data['2026-02-16'].push({ type: 'deadline', title: 'BUS105', time: '2355', desc: 'TMA01 (Tutor Marked Assignment)' });

              data['2026-03-01'] = [{ type: 'deadline', title: 'HRM313', time: '2359', desc: 'Mid-term Report' }];
              data['2026-03-15'] = [{ type: 'event', title: 'SUSS Open House', time: '0900 - 1800', venue: 'Main Campus', desc: 'Student Ambassador Duty' }];
              
              data['2026-04-20'] = [{ type: 'exam', title: 'MKT202 Exam', time: '0900 - 1100', venue: 'Blk A Hall', desc: 'Final Examination' }];
              data['2026-04-22'] = [{ type: 'exam', title: 'HRM313 Exam', time: '1400 - 1600', venue: 'Blk A Hall', desc: 'Final Examination' }];
              data['2026-04-24'] = [{ type: 'exam', title: 'BUS105 Exam', time: '0900 - 1100', venue: 'Blk B Hall', desc: 'Final Examination' }];

              return data;
            }, []);

            const getAcademicWeekInfo = (date) => {
              const termStart = new Date(2026, 0, 12); 
              const diffTime = Math.abs(date - termStart);
              const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
              const weekNumber = Math.ceil((diffDays + termStart.getDay()) / 7);
              
              const examStart = new Date(2026, 3, 13); 
              const examEnd = new Date(2026, 3, 25);   
              
              if (date >= examStart && date <= examEnd) return "Exams Week";
              if (date < termStart) return "Pre-Term";
              if (weekNumber > 12 && date < examStart) return "Study Break";
              if (weekNumber > 0 && weekNumber <= 12) return `Week ${weekNumber}`;
              return "";
            };

            const academicWeekText = getAcademicWeekInfo(currentWeekStart);

            const currentWeekDates = useMemo(() => {
              const dates = [];
              for (let i = 0; i < 7; i++) {
                const d = new Date(currentWeekStart);
                d.setDate(d.getDate() + i);
                dates.push(d);
              }
              return dates;
            }, [currentWeekStart]);

            const formatDate = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            const getDayName = (d) => d.toLocaleDateString('en-US', { weekday: 'short' });

            const handleDateSelect = (fDate) => {
              setSelectedDate(fDate);
              if (dateRefs.current[fDate]) {
                const container = scheduleScrollRef.current;
                const target = dateRefs.current[fDate];
                if (container && target) {
                   container.scrollTo({ top: target.offsetTop - container.offsetTop - 16, behavior: 'smooth' });
                }
              }
            };

            const nextWeek = () => {
              const next = new Date(currentWeekStart);
              next.setDate(next.getDate() + 7);
              setCurrentWeekStart(next);
              setSelectedDate(formatDate(next)); 
              if (scheduleScrollRef.current) scheduleScrollRef.current.scrollTop = 0;
            };

            const prevWeek = () => {
              const prev = new Date(currentWeekStart);
              prev.setDate(prev.getDate() - 7);
              setCurrentWeekStart(prev);
              setSelectedDate(formatDate(prev)); 
              if (scheduleScrollRef.current) scheduleScrollRef.current.scrollTop = 0;
            };

            const handleSync = () => {
              const gCalLink = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=HRM313+Class&dates=20260205T003000Z/20260205T033000Z&details=Auto-synced+from+SUSS+Backpack&location=SUSS+Campus+Room+C.3.11`;
              window.open(gCalLink, '_blank');
            };

            const nextMonth = () => setCalendarMonthDate(new Date(calendarMonthDate.getFullYear(), calendarMonthDate.getMonth() + 1, 1));
            const prevMonth = () => setCalendarMonthDate(new Date(calendarMonthDate.getFullYear(), calendarMonthDate.getMonth() - 1, 1));
            const daysInMonth = new Date(calendarMonthDate.getFullYear(), calendarMonthDate.getMonth() + 1, 0).getDate();
            const startDay = new Date(calendarMonthDate.getFullYear(), calendarMonthDate.getMonth(), 1).getDay();
            const monthDays = Array.from({ length: daysInMonth }, (_, i) => i + 1);
            const blanks = Array.from({ length: startDay }, (_, i) => i);

            return (
              <div className={`h-full flex flex-col relative transition-colors ${isDarkMode ? 'bg-gray-900' : 'bg-gray-50'}`}>
                
                {/* Absolute Dropdowns */}
                <div className="absolute top-4 right-4 z-[100] flex gap-3">
                  <div className="relative">
                    <button 
                      onClick={() => { setShowNotifs(!showNotifs); setShowSettings(false); }}
                      className={`relative p-2 rounded-full transition-colors shadow-sm ${isDarkMode ? 'bg-gray-800 text-gray-300 hover:bg-gray-700' : 'bg-white text-gray-700 hover:bg-gray-100'}`}
                    >
                      <Bell size={20} />
                      <span className={`absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 ${isDarkMode ? 'border-gray-800' : 'border-white'}`}></span>
                    </button>
                    
                    {showNotifs && (
                      <div className={`absolute right-0 top-12 w-72 max-w-[85vw] rounded-2xl shadow-2xl p-4 animate-in slide-in-from-top-2 border ${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-100'}`}>
                        <div className="flex justify-between items-center mb-3">
                          <h3 className={`font-bold ${isDarkMode ? 'text-white' : 'text-gray-800'}`}>Notifications</h3>
                          <button onClick={() => setShowNotifs(false)} className="text-gray-400 hover:text-gray-600"><X size={16}/></button>
                        </div>
                        <div className="space-y-3">
                          <div className={`p-3 rounded-xl ${isDarkMode ? 'bg-red-900/20 border border-red-900/50' : 'bg-red-50 border border-red-100'}`}>
                            <p className="text-[10px] font-bold text-red-600 uppercase tracking-wider mb-1 flex items-center gap-1"><BookOpen size={12}/> Canvas</p>
                            <p className={`text-xs font-semibold ${isDarkMode ? 'text-gray-200' : 'text-gray-800'}`}>MKT202 Assignment 1 Due</p>
                            <p className={`text-[10px] ${isDarkMode ? 'text-gray-400' : 'text-gray-500'}`}>Submission closes in 3 days.</p>
                          </div>
                          <div className={`p-3 rounded-xl ${isDarkMode ? 'bg-blue-900/20 border border-blue-900/50' : 'bg-blue-50 border border-blue-100'}`}>
                            <p className="text-[10px] font-bold text-blue-600 uppercase tracking-wider mb-1 flex items-center gap-1"><MapPin size={12}/> Admin</p>
                            <p className={`text-xs font-semibold ${isDarkMode ? 'text-gray-200' : 'text-gray-800'}`}>Venue Change: HRM313</p>
                            <p className={`text-[10px] ${isDarkMode ? 'text-gray-400' : 'text-gray-500'}`}>Class moved to C.3.11 today.</p>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="relative">
                    <button 
                      onClick={() => { setShowSettings(!showSettings); setShowNotifs(false); }}
                      className={`p-2 rounded-full transition-colors shadow-sm ${isDarkMode ? 'bg-gray-800 text-gray-300 hover:bg-gray-700' : 'bg-white text-gray-700 hover:bg-gray-100'}`}
                    >
                      <Settings size={20} />
                    </button>

                    {showSettings && (
                      <div className={`absolute right-0 top-12 w-64 max-w-[85vw] rounded-2xl shadow-2xl p-4 animate-in slide-in-from-top-2 border ${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-100'}`}>
                        <div className="flex justify-between items-center mb-4">
                          <h3 className={`font-bold ${isDarkMode ? 'text-white' : 'text-gray-800'}`}>Settings</h3>
                          <button onClick={() => setShowSettings(false)} className="text-gray-400 hover:text-gray-600"><X size={16}/></button>
                        </div>
                        
                        <div className="space-y-4">
                          <div className="flex items-center justify-between">
                            <span className={`text-sm font-semibold flex items-center gap-2 ${isDarkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                              {isDarkMode ? <Moon size={16}/> : <Sun size={16}/>} Appearance
                            </span>
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className={`w-12 h-6 rounded-full relative transition-colors ${isDarkMode ? 'bg-red-600' : 'bg-gray-300'}`}>
                              <div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${isDarkMode ? 'left-7' : 'left-1'}`}></div>
                            </button>
                          </div>

                          <div className={`h-px w-full ${isDarkMode ? 'bg-gray-700' : 'bg-gray-100'}`}></div>

                          <div>
                            <p className={`text-[10px] font-bold uppercase tracking-wider mb-2 ${isDarkMode ? 'text-gray-500' : 'text-gray-400'}`}>SUSS Support</p>
                            <a href="tel:+6562489228" className={`flex items-center gap-3 p-2 rounded-lg transition-colors text-sm mb-1 ${isDarkMode ? 'hover:bg-gray-700 text-gray-300' : 'hover:bg-gray-50 text-gray-700'}`}>
                              <Phone size={14} className="text-red-500"/>
                              <div>
                                <p className="font-semibold">IT Helpdesk</p>
                                <p className="text-[10px] text-gray-500">+65 6248 9228</p>
                              </div>
                            </a>
                            <a href="mailto:students@suss.edu.sg" className={`flex items-center gap-3 p-2 rounded-lg transition-colors text-sm mb-1 ${isDarkMode ? 'hover:bg-gray-700 text-gray-300' : 'hover:bg-gray-50 text-gray-700'}`}>
                              <Mail size={14} className="text-red-500"/>
                              <div>
                                <p className="font-semibold">Student Services</p>
                                <p className="text-[10px] text-gray-500">students@suss.edu.sg</p>
                              </div>
                            </a>
                            <a href="tel:+6562489220" className={`flex items-center gap-3 p-2 rounded-lg transition-colors text-sm ${isDarkMode ? 'hover:bg-gray-700 text-gray-300' : 'hover:bg-gray-50 text-gray-700'}`}>
                              <Phone size={14} className="text-red-500"/>
                              <div>
                                <p className="font-semibold">Library Hotline</p>
                                <p className="text-[10px] text-gray-500">+65 6248 9220</p>
                              </div>
                            </a>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                <div className="p-5 pt-8 flex-shrink-0">
                  <div className="pr-24">
                    <h1 className={`text-3xl font-bold ${isDarkMode ? 'text-gray-100' : 'text-red-600'}`}>Welcome Sarah</h1>
                    <p className={`text-sm font-medium ${isDarkMode ? 'text-gray-400' : 'text-gray-500'}`}>{user.email}</p>
                  </div>
                </div>

                <div className={`px-2 pt-2 pb-2 shadow-sm flex-shrink-0 z-10 ${isDarkMode ? 'border-gray-800 bg-gray-800/50' : 'border-emerald-50 bg-white'}`}>
                  <div className="flex justify-between items-center px-3 mb-2">
                    <button 
                      onClick={() => setShowMonthCalendar(true)}
                      className={`font-bold text-lg flex items-center gap-2 rounded-lg transition-colors ${isDarkMode ? 'text-emerald-400 hover:text-emerald-300' : 'text-emerald-700 hover:text-emerald-600'}`}
                    >
                      <CalendarIcon size={20} /> Academic Schedule <ChevronDown size={16}/>
                    </button>
                    
                    <div className="flex items-center gap-1">
                      <button onClick={prevWeek} className={`p-1 rounded-full ${isDarkMode ? 'bg-gray-700 text-gray-300' : 'bg-gray-100 text-gray-600'}`}><CalendarArrowLeft size={14}/></button>
                      <div className="flex flex-col items-center px-1">
                        <span className={`text-[10px] font-bold uppercase tracking-wider leading-none ${isDarkMode ? 'text-emerald-400' : 'text-emerald-700'}`}>
                          {academicWeekText}
                        </span>
                        <span className={`text-[9px] font-medium leading-none ${isDarkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                          {currentWeekDates[0].toLocaleDateString('en-GB', { month: 'short' })}
                        </span>
                      </div>
                      <button onClick={nextWeek} className={`p-1 rounded-full ${isDarkMode ? 'bg-gray-700 text-gray-300' : 'bg-gray-100 text-gray-600'}`}><CalendarArrowRight size={14}/></button>
                    </div>
                  </div>
                  
                  <div className="flex justify-between px-3 pb-2 gap-1">
                    {currentWeekDates.map((date, idx) => {
                      const fDate = formatDate(date);
                      const isSelected = fDate === selectedDate;
                      const hasEvents = scheduleData[fDate] && scheduleData[fDate].length > 0;
                      const isToday = fDate === '2026-02-05'; 

                      return (
                        <button
                          key={idx}
                          onClick={() => handleDateSelect(fDate)}
                          className={`flex-1 flex flex-col items-center justify-center py-2 rounded-xl transition-all border ${
                            isSelected 
                              ? 'bg-red-600 text-white border-red-600 shadow-md transform scale-105' 
                              : isDarkMode
                                ? 'bg-gray-800 border-gray-700 text-gray-300 hover:bg-gray-700'
                                : 'bg-gray-50 border-gray-100 text-gray-600 hover:bg-gray-100'
                          } ${isToday && !isSelected ? 'border-red-400 border-2' : ''}`}
                        >
                          <span className={`text-[10px] font-bold uppercase tracking-wider ${isSelected ? 'text-red-100' : (isDarkMode ? 'text-gray-500' : 'text-gray-400')}`}>{getDayName(date)}</span>
                          <span className="text-sm font-black">{date.getDate()}</span>
                          <div className="h-1.5 w-full flex justify-center gap-0.5 mt-0.5">
                            {hasEvents && scheduleData[fDate].map((ev, i) => (
                              <div key={i} className={`w-1 h-1 rounded-full ${isSelected ? 'bg-white' : (ev.type === 'deadline' ? 'bg-orange-500' : (ev.type === 'exam' ? 'bg-red-500' : (ev.type === 'event' ? 'bg-purple-500' : 'bg-emerald-500')))}`}></div>
                            ))}
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto hide-scrollbar p-5 pb-24 relative" ref={scheduleScrollRef}>
                  <div className="space-y-6">
                    {currentWeekDates.map((dateObj) => {
                       const date = formatDate(dateObj);
                       const events = scheduleData[date] || [];
                       const isToday = date === '2026-02-05';
                       
                       return (
                         <div key={date} ref={el => dateRefs.current[date] = el} className="scroll-mt-4 pb-2">
                           <div className="flex justify-between items-center mb-3">
                              <h3 className={`font-bold text-md ${isDarkMode ? 'text-white' : 'text-gray-800'}`}>
                                 {dateObj.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' })}
                              </h3>
                              {isToday && <span className={`text-[10px] font-bold px-2 py-0.5 rounded-md ${isDarkMode ? 'bg-red-900/50 text-red-300' : 'bg-red-100 text-red-700'}`}>TODAY</span>}
                           </div>

                           {events.length === 0 ? (
                              <div className={`p-4 text-center rounded-2xl border border-dashed ${isDarkMode ? 'bg-gray-800/50 border-gray-700 text-gray-500' : 'bg-gray-50 border-gray-200 text-gray-400'}`}>
                                 <p className="font-semibold text-xs">No classes or deadlines.</p>
                              </div>
                           ) : (
                             <div className="space-y-3">
                               {events.map((ev, idx) => (
                                 <div key={idx} className={`p-4 rounded-2xl shadow-sm border relative overflow-hidden ${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-100'}`}>
                                   <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${ev.type === 'deadline' ? 'bg-orange-500' : (ev.type === 'exam' ? 'bg-red-600' : (ev.type === 'event' ? 'bg-purple-500' : 'bg-emerald-500'))}`}></div>
                                   <div className="flex justify-between items-start mb-2 pl-2">
                                     <div>
                                       <span className={`text-[10px] font-black uppercase tracking-wider px-2 py-0.5 rounded flex items-center gap-1 mb-1 w-max ${
                                          ev.type === 'deadline' ? 'bg-orange-100 text-orange-700' : (ev.type === 'exam' ? 'bg-red-100 text-red-700' : (ev.type === 'event' ? 'bg-purple-100 text-purple-700' : 'bg-emerald-100 text-emerald-700'))
                                       }`}>
                                         {ev.type === 'deadline' ? <FileText size={10}/> : (ev.type === 'exam' ? <GraduationCap size={10}/> : (ev.type === 'event' ? <Users size={10}/> : <BookOpen size={10}/>))} {ev.type}
                                       </span>
                                       <h3 className={`font-bold text-xl ${isDarkMode ? 'text-white' : 'text-gray-800'}`}>{ev.title}</h3>
                                       <p className={`text-xs font-medium ${isDarkMode ? 'text-gray-400' : 'text-gray-500'}`}>{ev.desc}</p>
                                     </div>
                                   </div>
                                   
                                   <div className={`space-y-1 text-sm mb-4 pl-2 ${isDarkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                                     <p className="flex items-center gap-2">
                                       <Clock size={14} className={ev.type === 'deadline' ? 'text-orange-500' : (ev.type === 'exam' ? 'text-red-500' : 'text-emerald-500')}/> {ev.time}
                                     </p>
                                     {ev.venue && <p className="flex items-center gap-2"><MapPin size={14} className="text-emerald-500"/> {ev.venue}</p>}
                                   </div>
                                   
                                   {(ev.type === 'class' || ev.type === 'exam') && (

                    <div className={`text-center pt-2 flex items-center justify-center gap-2 ${isDarkMode ? 'text-gray-600' : 'text-gray-400'}`}>
                       <div className={`h-px w-12 ${isDarkMode ? 'bg-gray-700' : 'bg-gray-200'}`}></div>
                       <span className="text-xs font-bold uppercase tracking-widest">End of Week</span>
                       <div className={`h-px w-12 ${isDarkMode ? 'bg-gray-700' : 'bg-gray-200'}`}></div>
                    </div>
                    
                    <button onClick={handleSync} className={`w-full mt-4 py-4 rounded-xl font-bold flex items-center justify-center gap-3 transition-all shadow-md bg-[#4285F4] hover:bg-[#357ae8] text-white`}>
                      <CalendarIcon size={18} /> Sync to Google Calendar
                    </button>
                  </div>
                </div>

                {/* Full Month Calendar Modal (Overlay) */}
                {showMonthCalendar && (

                       <div className="flex justify-between items-center mb-6">
                         <button onClick={prevMonth} className={`p-2 rounded-full ${isDarkMode ? 'hover:bg-gray-700 text-white' : 'hover:bg-gray-100 text-gray-800'}`}><CalendarArrowLeft size={20}/></button>
                         <h2 className={`font-bold text-xl ${isDarkMode ? 'text-white' : 'text-gray-800'}`}>
                           {calendarMonthDate.toLocaleString('default', { month: 'long', year: 'numeric' })}
                         </h2>
                         <button onClick={nextMonth} className={`p-2 rounded-full ${isDarkMode ? 'hover:bg-gray-700 text-white' : 'hover:bg-gray-100 text-gray-800'}`}><CalendarArrowRight size={20}/></button>
                       </div>

                       <div className="grid grid-cols-7 gap-2 mb-2 text-center">
                         {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => <div key={d} className={`text-xs font-bold ${isDarkMode ? 'text-gray-500' : 'text-gray-400'}`}>{d}</div>)}
                         {blanks.map(b => <div key={`blank-${b}`} />)}
                         {monthDays.map(d => {
                            const cellDate = `${calendarMonthDate.getFullYear()}-${String(calendarMonthDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                            const hasEvent = !!scheduleData[cellDate];
                            const isSelected = selectedDate === cellDate;
                            return (
                              <button 
                                key={d} 
                                onClick={() => { 
                                  setSelectedDate(cellDate); 
                                  const dObj = new Date(cellDate);
                                  const day = dObj.getDay();
                                  const diff = dObj.getDate() - day + (day === 0 ? -6: 1); 
                                  setCurrentWeekStart(new Date(dObj.setDate(diff)));
                                  setShowMonthCalendar(false); 
                                  setTimeout(() => handleDateSelect(cellDate), 50);
                                }}
                                className={`aspect-square flex flex-col items-center justify-center rounded-full text-sm relative transition-all ${
                                  isSelected ? 'bg-red-600 text-white font-bold shadow-md' : (isDarkMode ? 'text-gray-200 hover:bg-gray-700' : 'text-gray-700 hover:bg-gray-100')

                                <span>{d}</span>
                                {hasEvent && <div className={`absolute bottom-1 w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-white' : 'bg-emerald-500'}`}></div>}
                              </button>

                       </div>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          const NavigationView = () => {
            const [searchQuery, setSearchQuery] = useState('');
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const [expandedCategory, setExpandedCategory] = useState(null);
            const [selectedDestination, setSelectedDestination] = useState(null);
            const [isNavigating, setIsNavigating] = useState(false);
            const [navStep, setNavStep] = useState(1);
            const [routeDetails, setRouteDetails] = useState(null);
            
            const handleSearchClick = () => setIsDropdownOpen(true);

            const generateRouteDetails = (dest) => {
              const matchSeminar = dest.match(/^C\.(\d)\.(\d{2})$/);
              if (matchSeminar) {
                const level = parseInt(matchSeminar[1]);
                const roomNum = parseInt(matchSeminar[2]);
                const lift = roomNum <= 10 ? "Lift C2" : "Lift CS";
                const estTime = level + 2; 
                let startRoom = 8, endRoom = 16;
                if (level === 5 || level === 7) startRoom = 7;
                if (level === 6) { startRoom = 5; endRoom = 13; }
                if (level === 8) { startRoom = 4; endRoom = 11; }
                const allRoomsOnFloor = generateRooms('C', level, startRoom, endRoom);
                const pathStep1 = roomNum <= 10 ? "M 30 90 L 30 40 L 50 40" : "M 30 90 L 75 90 L 75 60"; 
                const endPtStep1 = roomNum <= 10 ? { top: '40%', left: '50%' } : { top: '60%', left: '75%' };

                return {
                  type: 'multi-level', time: `${estTime} mins`, dest: dest, level: level, lift: lift,
                  allRooms: allRoomsOnFloor, targetRoomNum: roomNum,
                  step1: { instruction: `Walk to ${lift} to head to Level ${level}.`, path: pathStep1, endPoint: endPtStep1 },
                  step2: { instruction: `Exit ${lift} and follow the corridor to ${dest}.` }
                };
              } else if (locationData["Food & Drink"].items.includes(dest)) {
                return {
                  type: 'single-level', time: "4 mins", dest: dest,
                  step1: { instruction: `Walk across the main atrium to ${dest}.`, path: "M 30 90 L 30 70 L 80 70", endPoint: { top: '70%', left: '80%' } }
                };
              }
              return {
                type: 'single-level', time: "3 mins", dest: dest,
                step1: { instruction: `Follow the signs to ${dest}.`, path: "M 30 90 Q 30 50, 60 50", endPoint: { top: '50%', left: '60%' } }

              setNavStep(1);
              setRouteDetails(generateRouteDetails(dest));
            };

            const startNavigation = () => { setIsDropdownOpen(false); setIsNavigating(true); setNavStep(1); };
            const stopNavigation = () => { setIsNavigating(false); setSelectedDestination(null); setSearchQuery(''); setRouteDetails(null); setNavStep(1); };

                if (matches.length > 0) results.push({ category, icon: data.icon, items: matches });

              return results;

                        <Navigation size={16} /> Start

                            <div className="space-y-1">
                              {group.items.map((item, i) => (
                                <button key={i} onClick={() => handleSelectDestination(item)} className={`w-full text-left p-2 text-sm rounded-lg flex items-center gap-3 border-b last:border-0 ${isDarkMode ? 'hover:bg-gray-800 text-gray-400 border-gray-800' : 'hover:bg-red-50 text-gray-700 border-gray-50'}`}>
                                  <MapPin size={14} className="text-gray-400" /> {item}
                                </button>
                              ))}
                            </div>
                          </div>

                              <div className="flex items-center gap-3"><data.icon size={18} className="text-red-600" /><span className={`font-semibold text-sm ${isDarkMode ? 'text-gray-200' : 'text-gray-800'}`}>{category}</span></div>
                              {expandedCategory === category ? <ChevronUp size={16} className={isDarkMode ? 'text-gray-400' : ''}/> : <ChevronDown size={16} className={isDarkMode ? 'text-gray-400' : ''} />}
                            </button>
                            {expandedCategory === category && (
                              <div className={`p-2 max-h-60 overflow-y-auto border-t grid grid-cols-1 gap-1 ${isDarkMode ? 'bg-gray-900 border-gray-700' : 'bg-white border-gray-100'}`}>
                                {data.items.map((item, i) => (
                                  <button key={i} onClick={() => handleSelectDestination(item)} className={`text-left text-sm p-3 rounded-md transition-colors border-b last:border-0 ${isDarkMode ? 'text-gray-400 hover:bg-gray-800 hover:text-gray-200 border-gray-800' : 'text-gray-600 hover:bg-red-50 hover:text-red-700 border-gray-50'}`}>{item}</button>
                                ))}
                              </div>

                <div className={`flex-1 relative overflow-hidden ${isDarkMode ? 'bg-[#1f2937]' : 'bg-[#e2e8f0]'}`} onClick={() => setIsDropdownOpen(false)}>

                    <div className="isometric-map w-[120%] h-[120%] absolute">

                      <div className="building-block absolute top-[20%] left-[20%] w-[30%] h-[20%] flex items-center justify-center"><span className="font-bold text-gray-400 text-2xl -rotate-90">Block A</span></div>
                      <div className="building-block absolute top-[50%] left-[20%] w-[30%] h-[20%] flex items-center justify-center"><span className="font-bold text-gray-400 text-2xl -rotate-90">Block B</span></div>
                      <div className="building-block absolute top-[20%] left-[60%] w-[25%] h-[50%] flex items-center justify-center"><span className="font-bold text-emerald-600/40 text-2xl -rotate-90">Block C</span></div>

                      <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none" style={{ zIndex: 10 }}>
                        {isNavigating && navStep === 1 && routeDetails && (

                        )}
                      </svg>
                      <div className="absolute top-[90%] left-[30%] -translate-x-1/2 -translate-y-1/2 w-4 h-4 bg-blue-500 rounded-full border-2 border-white shadow-xl transform rotate-45"></div>
                      {isNavigating && navStep === 1 && routeDetails && (
                        <div className="absolute z-20 transition-transform transform rotate-45" style={{ top: routeDetails.step1.endPoint.top, left: routeDetails.step1.endPoint.left }}><MapPin className="text-red-600 drop-shadow-xl animate-bounce" size={24} /></div>
                      )}
                    </div>
                  </div>
                  
                  {/* Fixed Non-Squashing Floor Layout Area */}
                  <div className={`absolute inset-0 w-full h-full p-4 overflow-y-auto ${navStep === 2 ? 'opacity-100 z-10 pointer-events-auto' : 'opacity-0 pointer-events-none'} transition-opacity duration-500 ${isDarkMode ? 'bg-gray-900' : 'bg-[#f8fafc]'}`}>
                     {navStep === 2 && routeDetails && routeDetails.type === 'multi-level' && (
                       <div className="w-full flex flex-col relative animate-in zoom-in-95 duration-500 min-h-[450px]">
                          <div className="text-center mb-4 shrink-0">
                            <h3 className={`font-black tracking-widest uppercase ${isDarkMode ? 'text-white' : 'text-gray-800'}`}>Block C • Level {routeDetails.level}</h3>
                            <p className="text-xs text-gray-500">Floor Layout</p>
                          </div>
                          
                          <div className="flex justify-around items-end h-28 px-2 gap-1 shrink-0">
                            {routeDetails.allRooms.slice(0, Math.ceil(routeDetails.allRooms.length/2)).map((room) => (
                                <div key={room} className={`flex-1 h-full border-2 rounded-t-xl flex items-center justify-center text-[10px] font-bold transition-all ${room === selectedDestination ? 'bg-red-100 border-red-500 text-red-700 shadow-md z-10 scale-105' : (isDarkMode ? 'bg-gray-800 border-gray-700 text-gray-500' : 'bg-white border-gray-200 text-gray-400')}`}>
                                  <span className="transform -rotate-90 whitespace-nowrap">{room.split('.')[2]}</span>
                                </div>
                            ))}
                          </div>
                          
                          <div className={`h-20 w-full relative border-y-2 flex items-center shadow-inner shrink-0 ${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-gray-200 border-gray-300'}`}>

                             <div className="absolute right-[10%] -bottom-2 bg-blue-600 text-white text-[8px] font-bold px-2 py-1 rounded shadow-sm">LIFT CS</div>
                             <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                               <path d={routeDetails.lift === "Lift C2" ? "M 10% 50% L 70% 50%" : "M 90% 50% L 30% 50%"} fill="none" stroke="#ef4444" strokeWidth="4" strokeDasharray="4 4" className="path-animate"/>
                             </svg>
                          </div>
                          
                          <div className="flex justify-around items-start h-28 px-2 gap-1 shrink-0">
                            {routeDetails.allRooms.slice(Math.ceil(routeDetails.allRooms.length/2)).map((room) => (
                                <div key={room} className={`flex-1 h-full border-2 rounded-b-xl flex items-center justify-center text-[10px] font-bold transition-all ${room === selectedDestination ? 'bg-red-100 border-red-500 text-red-700 shadow-md z-10 scale-105' : (isDarkMode ? 'bg-gray-800 border-gray-700 text-gray-500' : 'bg-white border-gray-200 text-gray-400')}`}>
                                  <span className="transform -rotate-90 whitespace-nowrap">{room.split('.')[2]}</span>

                            <Info size={16} className="text-blue-500 flex-shrink-0 mt-0.5" />
                            <p className={`text-xs leading-relaxed ${isDarkMode ? 'text-blue-200' : 'text-blue-800'}`}>The floor plan helps you locate <strong>{selectedDestination}</strong> in relation to other classrooms on Level {routeDetails.level}.</p>
                          </div>
                       </div>
                     )}
                  </div>
                </div>
              </div>
            );
          };

          const CCTVView = () => {
            const [activeCam, setActiveCam] = useState('sim_canteen');
            const [currentTime, setCurrentTime] = useState(new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second: '2-digit'}));

            useEffect(() => {
              const timer = setInterval(() => setCurrentTime(new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second: '2-digit'})), 1000);
              return () => clearInterval(timer);
            }, []);

            const cameras = {
              sim_canteen: { id: 'sim_canteen', name: 'SIM Canteen', img: 'https://alric.com.sg/wp-content/uploads/2024/12/kampungSIM2.jpg', status: 'Highly Crowded', occupancy: '85%', colorClass: 'text-red-600', bgClass: 'bg-red-50', borderClass: 'border-red-200', barColor: 'bg-red-500' },
              food_clique: { id: 'food_clique', name: 'Food Clique', img: 'https://lh3.googleusercontent.com/gps-cs-s/AHVAwered3cHmQ4i0Y4weT3OjBZ_qKSlYbAHFhyZ5osPsW4vb3qqNgbqSCM--DzY8nYtXL0LAHk-M__-6FTcJIdiWojUBq4ymNzIcU49uUvhArIS0wDF19m91kiXG7xDP8U8c7JKGcKaWCklRdWM=s680-w680-h510', status: 'Available Seats', occupancy: '35%', colorClass: 'text-emerald-600', bgClass: 'bg-emerald-50', borderClass: 'border-emerald-200', barColor: 'bg-emerald-500' }
            };
            const currentCam = cameras[activeCam];

            return (
              <div className={`h-full flex flex-col animate-in fade-in slide-in-from-bottom-4 duration-300 overflow-y-auto pb-16 ${isDarkMode ? 'bg-gray-900 text-white' : 'bg-gray-50 text-gray-800'}`}>
                <MobileHeader title="Crowd Cams" />
                <div className="p-4">

              : user.currentCGPA.toFixed(2);

            const addModule = () => setSimModules([...simModules, { id: Date.now(), name: 'New Module', grade: 'B', cu: 5 }]);
            const removeModule = (id) => setSimModules(simModules.filter(m => m.id !== id));
            const updateModule = (id, field, value) => {

            };

              const currentMock = mockBooked[facility.id] || {};
              if (currentMock[room]?.includes(time)) return; 
              
              const slotId = `${room}-${time}`;
              if (selectedSlots.includes(slotId)) {

                            {timeSlots.map(time => (<div key={time} className={`flex-1 text-center p-3 text-xs font-bold border-r last:border-0 ${isDarkMode ? 'border-gray-700 text-gray-300' : 'border-gray-200 text-gray-600'}`}>{time}</div>))}
                          </div>
                          {facility.rooms.map((room) => (
                            <div key={room} className={`flex border-b last:border-0 ${isDarkMode ? 'border-gray-700' : 'border-gray-200'}`}>

                              {timeSlots.map(time => {
                                const slotId = `${room}-${time}`;
                                const currentMock = mockBooked[facility.id] || {};
                                const isBooked = currentMock[room]?.includes(time);
                                const isSelected = selectedSlots.includes(slotId);
                                
                                let bgClass = "bg-green-500 hover:bg-green-400 cursor-pointer"; 
                                if (isBooked) bgClass = "bg-red-600 cursor-not-allowed opacity-80"; 
                                if (isSelected) bgClass = "bg-amber-500 shadow-inner"; 

                                return (
                                  <div 
                                    key={time} 
                                    className={`flex-1 h-12 border-r last:border-0 transition-colors ${bgClass} ${isDarkMode && !isBooked && !isSelected ? 'border-gray-700 opacity-90' : 'border-gray-200'}`}

                    <h3 className="text-2xl font-black mb-2">Verification Sent</h3>
                    <p className={`mb-8 max-w-[250px] ${isDarkMode ? 'text-gray-400' : 'text-gray-600'}`}>We've sent a verification email to <strong>{user.email}</strong>. Please click the link inside within <span className="text-red-500 font-bold">15 minutes</span> to confirm your booking.</p>
                    <button onClick={() => setCurrentView('home')} className="w-full bg-red-600 text-white py-4 rounded-xl font-bold shadow-lg">Return to Home</button>
                  </div>
                )}
              </div>
            );
          };

          return (
            <div className="flex justify-center bg-gray-200 min-h-screen p-4 sm:p-8 font-sans">
              <div className={`w-full max-w-[400px] h-[850px] max-h-[95vh] shrink-0 rounded-[2.5rem] shadow-2xl relative overflow-hidden border-[8px] border-gray-900 transition-colors ${isDarkMode ? 'bg-gray-900' : 'bg-gray-50'}`}>

                  {currentView === 'home' && <HomeView />}
                  {currentView === 'navigation' && <NavigationView />}
                  {currentView === 'cctv' && <CCTVView />}
                  {currentView === 'idcard' && <IDCardView />}
                  {currentView === 'bookings' && <BookingsView />}
                  {currentView === 'cgpa' && <CGPAView />}
                </div>

                {/* Global Bottom Navigation */}
                <div className={`absolute bottom-0 w-full px-4 py-3 flex justify-between items-center z-[100] shadow-[0_-5px_15px_rgba(0,0,0,0.1)] transition-colors ${isDarkMode ? 'bg-gray-800 border-t border-gray-700' : 'bg-white border-t border-gray-100'}`}>
                  <button onClick={() => setCurrentView('home')} className={`flex flex-col items-center gap-1 transition-colors ${currentView === 'home' ? 'text-red-500' : (isDarkMode ? 'text-gray-400 hover:text-gray-300' : 'text-gray-400 hover:text-gray-600')}`}>
                    <Home size={20} className={currentView === 'home' && !isDarkMode ? 'fill-red-100' : ''} />
                    <span className="text-[9px] font-bold">Home</span>
                  </button>
                  
                  <button onClick={() => setCurrentView('navigation')} className={`flex flex-col items-center gap-1 transition-colors ${currentView === 'navigation' ? 'text-red-500' : (isDarkMode ? 'text-gray-400 hover:text-gray-300' : 'text-gray-400 hover:text-gray-600')}`}>
                    <MapPin size={20} className={currentView === 'navigation' && !isDarkMode ? 'fill-red-100' : ''} />
                    <span className="text-[9px] font-bold">Map</span>
                  </button>

                  <button onClick={() => setCurrentView('cctv')} className={`flex flex-col items-center gap-1 transition-colors ${currentView === 'cctv' ? 'text-red-500' : (isDarkMode ? 'text-gray-400 hover:text-gray-300' : 'text-gray-400 hover:text-gray-600')}`}>
                    <Video size={20} className={currentView === 'cctv' && !isDarkMode ? 'fill-red-100' : ''} />
                    <span className="text-[9px] font-bold">Cameras</span>
                  </button>

                  <button onClick={() => setCurrentView('idcard')} className={`flex flex-col items-center gap-1 transition-colors ${currentView === 'idcard' ? 'text-red-500' : (isDarkMode ? 'text-gray-400 hover:text-gray-300' : 'text-gray-400 hover:text-gray-600')}`}>
                    <CreditCard size={20} className={currentView === 'idcard' && !isDarkMode ? 'fill-red-100' : ''} />
                    <span className="text-[9px] font-bold">ID Card</span>
                  </button>

                  <button onClick={() => setCurrentView('bookings')} className={`flex flex-col items-center gap-1 transition-colors ${currentView === 'bookings' ? 'text-red-500' : (isDarkMode ? 'text-gray-400 hover:text-gray-300' : 'text-gray-400 hover:text-gray-600')}`}>
                    <CalendarIcon size={20} className={currentView === 'bookings' && !isDarkMode ? 'fill-red-100' : ''} />
                    <span className="text-[9px] font-bold">Book</span>
                  </button>

                  <button onClick={() => setCurrentView('cgpa')} className={`flex flex-col items-center gap-1 transition-colors ${currentView === 'cgpa' ? 'text-red-500' : (isDarkMode ? 'text-gray-400 hover:text-gray-300' : 'text-gray-400 hover:text-gray-600')}`}>
                    <Menu size={20} className={currentView === 'cgpa' && !isDarkMode ? 'fill-red-100' : ''} />
                    <span className="text-[9px] font-bold">Grades</span>
                  </button>
                </div>
              </div>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
